<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="description" content="Bubble Math — pop the bubble with the right answer! A fun math reflex game.">
  <meta name="theme-color" content="#0b1426">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Bubble Math</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700;800&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════════════════════════
       DESIGN SYSTEM (Vibrant Ocean/Reef Theme)
       ═══════════════════════════════════════════════════════════ */
    :root {
      --bg-deep: #072233; /* Deep navy ocean */
      --bg-card: rgba(255, 255, 255, 0.08);
      --bg-card-hover: rgba(255, 255, 255, 0.14);
      --bg-card-active: rgba(255, 255, 255, 0.2);

      --accent-cyan: #00d2ff;
      --accent-cyan-glow: rgba(0, 210, 255, 0.4);
      --accent-teal: #05c46b;
      --accent-teal-glow: rgba(5, 196, 107, 0.35);
      --accent-purple: #a55eea;
      --accent-orange: #ff9f43;
      --accent-pink: #ff7675;
      --accent-blue: #0984e3;
      --accent-success: #1dd1a1;
      --accent-success-glow: rgba(29, 209, 161, 0.4);
      --accent-danger: #ff6b6b;
      --accent-danger-glow: rgba(255, 107, 107, 0.4);
      --accent-yellow: #ffdd59;

      --text-primary: #ffffff;
      --text-secondary: #e1f5fe;
      --text-muted: rgba(225, 245, 254, 0.5);

      --font-display: 'Fredoka', system-ui, sans-serif;
      --font-body: 'Quicksand', system-ui, sans-serif;

      --radius-sm: 10px;
      --radius-md: 18px;
      --radius-lg: 26px;
      --radius-full: 9999px;

      --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none; user-select: none; }

    html, body { height: 100%; overflow: hidden; touch-action: manipulation; }

    body {
      font-family: var(--font-body);
      background: linear-gradient(180deg, #1A8CB7 0%, #072233 100%);
      color: var(--text-primary);
      position: relative;
    }

    /* Ambient Ocean Waves & Seaweed */
    .bg-waves {
      position: fixed; inset: 0;
      background: radial-gradient(circle at 50% -20%, rgba(0, 210, 255, 0.22) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
      animation: wave-sway 8s ease-in-out infinite alternate;
    }
    @keyframes wave-sway {
      0% { transform: translateY(0) scale(1); }
      100% { transform: translateY(-15px) scale(1.06); }
    }

    .bg-seaweed {
      position: fixed; bottom: -20px;
      width: 50px; height: 180px;
      background: linear-gradient(0deg, rgba(5, 196, 107, 0.08) 0%, transparent 100%);
      border-radius: 50% 50% 0 0;
      filter: blur(1.5px);
      transform-origin: bottom center;
      animation: seaweed-sway 6s ease-in-out infinite alternate;
      pointer-events: none; z-index: 0;
    }
    .bg-seaweed--1 { left: 6%; height: 160px; animation-duration: 5s; }
    .bg-seaweed--2 { right: 8%; height: 210px; animation-duration: 7s; animation-delay: -2s; }
    @keyframes seaweed-sway {
      0% { transform: skewX(-6deg) scaleY(0.96); }
      100% { transform: skewX(6deg) scaleY(1.04); }
    }

    .bg-bubbles {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
    }
    .bg-bubble-particle {
      position: absolute; bottom: -50px;
      background: rgba(255, 255, 255, 0.06);
      border: 1.5px solid rgba(255, 255, 255, 0.12);
      border-radius: 50%;
      pointer-events: none;
      animation: float-up 12s linear infinite;
    }
    @keyframes float-up {
      0% { transform: translateY(0) translateX(0) scale(0.6); opacity: 0; }
      10% { opacity: 0.5; }
      90% { opacity: 0.5; }
      100% { transform: translateY(-110vh) translateX(var(--drift, 20px)) scale(1.1); opacity: 0; }
    }

    /* ═══════════════════════════════════════════════════════════
       SCREENS & LAYOUT
       ═══════════════════════════════════════════════════════════ */
    .screen {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center;
      z-index: 1; opacity: 0; transform: scale(0.96);
      transition: opacity 0.3s var(--ease-out-expo), transform 0.3s var(--ease-out-expo);
      pointer-events: none;
    }
    .screen.active { opacity: 1; transform: scale(1); pointer-events: auto; }

    /* ═══════════════════════════════════════════════════════════
       SELECTION SCREEN
       ═══════════════════════════════════════════════════════════ */
    #screen-select {
      padding: 24px 20px;
      overflow-y: auto;
      justify-content: flex-start;
      -webkit-overflow-scrolling: touch;
    }

    .sel-title {
      font-family: var(--font-display); font-weight: 800;
      font-size: clamp(2.5rem, 9vw, 3.5rem); letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--text-primary) 30%, var(--accent-cyan));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; margin-bottom: 4px; margin-top: 10px;
      filter: drop-shadow(0 4px 10px rgba(0,0,0,0.15));
    }
    .sel-subtitle {
      font-size: 1.05rem; color: var(--text-secondary);
      margin-bottom: 24px; text-align: center;
    }
    .sel-subtitle span { color: var(--accent-cyan); font-weight: 700; }

    .section-label {
      font-family: var(--font-display);
      font-size: 0.85rem; color: var(--accent-yellow); text-transform: uppercase;
      letter-spacing: 1.5px; width: 100%; max-width: 400px;
      margin-bottom: 8px; padding-left: 4px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.15);
    }

    /* ── Operation Cards ── */
    .op-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 12px; width: 100%; max-width: 400px; margin-bottom: 12px;
    }
    .op-card {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 4px;
      padding: 12px 8px; border-radius: var(--radius-md);
      background: var(--bg-card);
      border: 2px solid rgba(255,255,255,0.06);
      cursor: pointer;
      box-shadow: inset 0 -4px 6px rgba(0,0,0,0.1);
      transition: all 0.2s var(--ease-spring);
      min-height: 80px;
    }
    .op-card:hover {
      transform: translateY(-3px);
      background: var(--bg-card-hover);
      border-color: rgba(255,255,255,0.15);
    }
    .op-card:active { transform: scale(0.93); }
    .op-card .op-symbol {
      font-family: var(--font-display); font-size: 1.7rem; font-weight: 800;
    }
    .op-card .op-name {
      font-size: 0.78rem; color: var(--text-secondary);
      font-weight: 700;
    }
    .op-card.selected {
      background: var(--bg-card-active);
      border-color: var(--card-accent, var(--accent-cyan));
      box-shadow: 0 0 20px var(--card-glow, var(--accent-cyan-glow)), inset 0 -4px 6px rgba(0,0,0,0.05);
    }
    .op-card.selected .op-symbol { color: var(--card-accent, var(--accent-cyan)); }

    .op-card[data-op="add"]  { --card-accent: var(--accent-teal); --card-glow: var(--accent-teal-glow); }
    .op-card[data-op="sub"]  { --card-accent: var(--accent-orange); --card-glow: rgba(255,159,67,0.35); }
    .op-card[data-op="mul"]  { --card-accent: var(--accent-purple); --card-glow: rgba(165,94,234,0.35); }
    .op-card[data-op="div"]  { --card-accent: var(--accent-blue); --card-glow: rgba(9,132,227,0.35); }
    .op-card[data-op="mix"]  { --card-accent: var(--accent-pink); --card-glow: rgba(255,118,117,0.35); }

    /* ── Table Chips ── */
    .tables-section {
      width: 100%; max-width: 400px;
      max-height: 0; overflow: hidden; opacity: 0;
      transition: max-height 0.35s var(--ease-out-expo), opacity 0.25s, margin 0.25s;
      margin-bottom: 0;
    }
    .tables-section.visible {
      max-height: 200px; opacity: 1; margin-bottom: 16px; margin-top: 10px;
    }
    .table-chips {
      display: flex; flex-wrap: wrap; gap: 8px;
      justify-content: center; padding: 4px 0;
    }
    .table-chip {
      width: 46px; height: 46px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display); font-size: 0.95rem; font-weight: 800;
      background: var(--bg-card); border: 2px solid rgba(255,255,255,0.06);
      color: var(--text-secondary); cursor: pointer;
      box-shadow: inset 0 -3px 4px rgba(0,0,0,0.1);
      transition: all 0.15s var(--ease-spring);
    }
    .table-chip:hover {
      transform: translateY(-2px);
      background: var(--bg-card-hover);
    }
    .table-chip:active { transform: scale(0.9); }
    .table-chip.selected {
      background: rgba(0, 210, 255, 0.18);
      border-color: var(--accent-cyan);
      color: var(--accent-cyan);
      box-shadow: 0 0 12px var(--accent-cyan-glow), inset 0 -3px 4px rgba(0,0,0,0.05);
    }

    /* ── Mode Toggle ── */
    .mode-row {
      display: flex; gap: 10px; margin-bottom: 24px; margin-top: 4px;
      width: 100%; max-width: 400px; justify-content: center;
    }
    .mode-btn {
      flex: 1; max-width: 180px; height: 48px;
      border: 2px solid rgba(255,255,255,0.06);
      border-radius: var(--radius-full); background: var(--bg-card);
      color: var(--text-secondary); font-family: var(--font-body);
      font-size: 0.95rem; font-weight: 700; cursor: pointer;
      box-shadow: inset 0 -3px 4px rgba(0,0,0,0.1);
      transition: all 0.2s var(--ease-spring);
    }
    .mode-btn:hover {
      transform: translateY(-2px);
      background: var(--bg-card-hover);
    }
    .mode-btn:active { transform: scale(0.94); }
    .mode-btn.selected {
      background: rgba(0, 210, 255, 0.18);
      border-color: var(--accent-cyan);
      color: var(--accent-cyan);
      box-shadow: 0 0 16px var(--accent-cyan-glow), inset 0 -3px 4px rgba(0,0,0,0.05);
    }

    /* ── Start Button ── */
    .btn-start {
      width: min(300px, 85vw); height: 60px; border: none;
      border-radius: var(--radius-full);
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-teal));
      color: var(--bg-deep); font-family: var(--font-display);
      font-size: 1.2rem; font-weight: 800; letter-spacing: 0.5px;
      cursor: pointer; position: relative; overflow: hidden;
      box-shadow: 0 6px 20px var(--accent-cyan-glow);
      transition: transform 0.15s var(--ease-spring), box-shadow 0.3s, opacity 0.2s;
      animation: pulse-glow-cyan 2.5s ease-in-out infinite;
    }
    .btn-start:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 8px 25px var(--accent-cyan-glow);
    }
    .btn-start:active { transform: scale(0.95); }
    .btn-start:disabled { opacity: 0.35; cursor: not-allowed; animation: none; box-shadow: none; }
    .btn-start::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.22), transparent);
      border-radius: inherit;
    }
    @keyframes pulse-glow-cyan {
      0%,100% { box-shadow: 0 4px 20px var(--accent-cyan-glow); }
      50% { box-shadow: 0 4px 35px var(--accent-cyan-glow), 0 0 50px rgba(0,210,255,0.2); }
    }

    /* ── Stats Row ── */
    .sel-stats {
      display: flex; gap: 20px; margin-top: 24px; margin-bottom: 16px;
    }
    .mini-stat {
      text-align: center; padding: 12px 20px;
      background: var(--bg-card); border-radius: var(--radius-md);
      border: 2px solid rgba(255,255,255,0.06);
      box-shadow: inset 0 -3px 4px rgba(0,0,0,0.1);
    }
    .mini-stat__label {
      font-size: 0.72rem; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 4px;
    }
    .mini-stat__value {
      font-family: var(--font-display); font-size: 1.35rem;
      font-weight: 800; color: var(--accent-yellow);
    }

    /* ═══════════════════════════════════════════════════════════
       GAME SCREEN
       ═══════════════════════════════════════════════════════════ */
    #screen-game {
      padding: 0; justify-content: flex-start;
    }

    .game-hud {
      width: 100%; display: flex; justify-content: space-between;
      align-items: center; padding: 12px 18px; z-index: 20;
      background: rgba(7, 34, 51, 0.85); backdrop-filter: blur(10px);
      border-bottom: 2px solid rgba(255,255,255,0.05);
    }
    .hud-item {
      font-family: var(--font-display); font-size: 0.95rem; font-weight: 800;
      color: var(--text-secondary); background: var(--bg-card);
      padding: 6px 14px; border-radius: var(--radius-full);
      border: 2px solid rgba(255,255,255,0.06);
      box-shadow: inset 0 -2px 3px rgba(0,0,0,0.1);
    }
    .hud-item span { color: var(--accent-yellow); }

    .hud-lives {
      display: flex; gap: 6px; font-size: 1.3rem;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));
    }
    .hud-lives .heart { transition: opacity 0.25s, transform 0.25s var(--ease-spring); }
    .hud-lives .heart.lost { opacity: 0.15; transform: scale(0.65) rotate(-15deg); }

    .question-bar {
      width: 100%; display: flex; justify-content: center; align-items: center;
      gap: 16px; padding: 12px 20px; z-index: 15;
      background: rgba(7, 34, 51, 0.7); backdrop-filter: blur(10px);
      border-bottom: 3px solid rgba(255,255,255,0.06);
    }

    /* Mascot widget styles */
    .mascot-container {
      width: 58px; height: 58px; position: relative; flex-shrink: 0;
    }
    .mascot {
      width: 100%; height: 100%; position: relative;
      animation: mascot-bob 3s ease-in-out infinite alternate;
      transform-origin: bottom center;
    }
    @keyframes mascot-bob {
      0% { transform: translateY(0); }
      100% { transform: translateY(-6px) scaleY(1.02); }
    }
    .octopus-head {
      width: 46px; height: 40px;
      background: #ec4899; /* cute coral pink */
      border-radius: 23px 23px 18px 18px;
      position: absolute; top: 4px; left: 6px;
      box-shadow: inset -3px -3px 6px rgba(0,0,0,0.2), inset 3px 3px 6px rgba(255,255,255,0.3);
      display: flex; flex-direction: column; align-items: center;
      justify-content: flex-start; transition: all 0.3s var(--ease-spring);
      z-index: 2;
    }
    .octopus-eyes {
      display: flex; gap: 8px; margin-top: 10px;
    }
    .octopus-eye {
      width: 11px; height: 11px; background: white; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      position: relative; animation: eye-blink 4s infinite;
    }
    @keyframes eye-blink {
      0%, 94%, 98%, 100% { transform: scaleY(1); }
      96% { transform: scaleY(0); }
    }
    .octopus-pupil {
      width: 5px; height: 5px; background: #072233; border-radius: 50%;
      transition: all 0.2s ease;
    }
    .octopus-mouth {
      width: 8px; height: 5px; border-bottom: 2.5px solid #072233;
      border-radius: 0 0 4px 4px; margin-top: 4px;
      transition: all 0.2s ease;
    }
    .octopus-tentacles {
      position: absolute; bottom: 8px; left: 8px;
      display: flex; gap: 2px; z-index: 1;
    }
    .tentacle {
      width: 7px; height: 14px; background: #d946ef;
      border-radius: 4px; transform-origin: top center;
      animation: tentacle-wiggle 1.5s ease-in-out infinite alternate;
    }
    .tentacle.t1 { animation-delay: 0s; }
    .tentacle.t2 { animation-delay: 0.15s; }
    .tentacle.t3 { animation-delay: 0.3s; }
    .tentacle.t4 { animation-delay: 0.45s; }
    @keyframes tentacle-wiggle {
      0% { transform: rotate(-18deg); }
      100% { transform: rotate(18deg); }
    }

    /* Mascot Reactions */
    .mascot.celebrate {
      animation: mascot-jump 0.5s var(--ease-spring) 2;
    }
    .mascot.celebrate .octopus-head {
      background: #10b981 !important; /* Turns green */
    }
    .mascot.celebrate .octopus-pupil {
      background: #10b981; transform: scale(1.4);
    }
    .mascot.celebrate .octopus-mouth {
      width: 10px; height: 9px; border: 2.5px solid #072233;
      border-radius: 50%; background: #072233; margin-top: 2px;
    }
    .mascot.sad {
      animation: mascot-shiver 0.4s ease-in-out;
    }
    .mascot.sad .octopus-head {
      background: #6366f1 !important; /* Turns blue-purple */
    }
    .mascot.sad .octopus-eye {
      transform: scaleY(0.2) !important; animation: none;
    }
    .mascot.sad .octopus-mouth {
      width: 8px; height: 5px; border-top: 2.5px solid #072233;
      border-bottom: none; border-radius: 4px 4px 0 0; margin-top: 6px;
    }
    @keyframes mascot-jump {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-18px) rotate(10deg) scale(1.05); }
    }
    @keyframes mascot-shiver {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-5px); }
      40%, 80% { transform: translateX(5px); }
    }

    /* Question board */
    .question-board {
      flex: 1; max-width: 300px; background: rgba(255, 255, 255, 0.08);
      border: 2px solid rgba(255,255,255,0.12); border-radius: var(--radius-md);
      padding: 6px 16px; box-shadow: inset 0 2px 4px rgba(255,255,255,0.1);
      display: flex; align-items: center; justify-content: center;
    }
    .question-text {
      font-family: var(--font-display); font-weight: 800;
      font-size: clamp(1.8rem, 6.5vw, 2.4rem);
      color: var(--accent-yellow);
      text-shadow: 0 3px 6px rgba(0,0,0,0.25);
    }
    .question-text.pop-in {
      animation: q-pop 0.3s var(--ease-spring);
    }
    @keyframes q-pop {
      0% { transform: scale(0.85); opacity: 0.6; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* ── Play Area ── */
    .play-area {
      flex: 1; width: 100%; position: relative;
      overflow: hidden; z-index: 10;
    }

    /* ── Bubbles ── */
    .bubble {
      position: absolute;
      border-radius: 50%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: white; cursor: pointer;
      will-change: transform, opacity;
      z-index: 12;
      box-shadow: inset 0 5px 8px rgba(255,255,255,0.45), inset 0 -5px 8px rgba(0,0,0,0.15);
    }
    .bubble::before {
      content: ''; position: absolute;
      top: 8%; left: 12%; width: 22%; height: 16%;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(255,255,255,0.65), transparent);
      pointer-events: none;
    }
    .bubble:active { filter: brightness(1.25); }

    /* Bubble Face elements */
    .bubble-eyes {
      display: flex; gap: 6px; margin-bottom: 2px;
      z-index: 1; pointer-events: none;
    }
    .bubble-eye {
      width: 9px; height: 9px; background: white; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .bubble-pupil {
      width: 4.5px; height: 4.5px; background: #000; border-radius: 50%;
    }
    .bubble-mouth {
      width: 7px; height: 4px; border-bottom: 1.8px solid rgba(0,0,0,0.65);
      border-radius: 0 0 3px 3px; margin-bottom: 3px;
      z-index: 1; pointer-events: none;
    }
    .bubble-val {
      font-family: var(--font-display); font-weight: 800;
      line-height: 1; text-shadow: 0 2px 4px rgba(0,0,0,0.2);
      z-index: 2; pointer-events: none;
    }

    /* Worried Face (near-miss decoy bubbles) */
    .bubble.worry .bubble-eye {
      transform: scaleY(0.7);
    }
    .bubble.worry .bubble-mouth {
      width: 6px; height: 5px; border: 1.5px solid rgba(0,0,0,0.65);
      border-radius: 50%; background: transparent; margin-bottom: 2px;
    }

    /* Pop animation */
    .bubble.popping {
      animation: bubble-pop 0.35s var(--ease-out-expo) forwards;
      pointer-events: none;
    }
    .bubble.popping .bubble-eye {
      background: transparent; border: none; height: 6px; width: 6px;
      border-top: 1.8px solid white; border-radius: 0; transform: translateY(2px);
    }
    .bubble.popping .bubble-mouth {
      width: 8px; height: 8px; border: 1.8px solid white;
      border-radius: 50%; background: white;
    }
    @keyframes bubble-pop {
      0% { transform: var(--pos) scale(1); opacity: 1; }
      40% { transform: var(--pos) scale(1.35); opacity: 0.7; }
      100% { transform: var(--pos) scale(1.75); opacity: 0; }
    }

    /* Wrong bubble */
    .bubble.wrong {
      animation: bubble-wrong 0.4s var(--ease-out-expo) forwards;
      pointer-events: none;
    }
    .bubble.wrong .bubble-eye {
      background: white;
    }
    .bubble.wrong .bubble-pupil {
      width: 6px; height: 6px; background: transparent; border-radius: 0;
      border-top: 1.8px solid #ef4444; border-bottom: 1.8px solid #ef4444;
      transform: rotate(45deg);
    }
    .bubble.wrong .bubble-mouth {
      width: 7px; height: 4px; border-top: 1.8px solid rgba(0,0,0,0.7);
      border-bottom: none; border-radius: 3px 3px 0 0; margin-top: 3px;
    }
    @keyframes bubble-wrong {
      0% { transform: var(--pos) scale(1); opacity: 1; }
      20% { transform: var(--pos) scale(1.1); }
      50% { transform: var(--pos) scale(0.85); opacity: 0.6; }
      100% { transform: var(--pos) scale(0.5); opacity: 0; }
    }

    /* Spawn animation */
    .bubble.spawning {
      animation: bubble-spawn 0.4s var(--ease-spring) forwards;
    }
    @keyframes bubble-spawn {
      0% { transform: var(--pos) scale(0); opacity: 0; }
      100% { transform: var(--pos) scale(1); opacity: 1; }
    }

    /* Squash & stretch wiggles (bouncy directional impact squishes) */
    @keyframes bubble-squish-x {
      0% { transform: var(--pos) scale(1, 1); }
      25% { transform: var(--pos) scale(0.72, 1.28); }
      50% { transform: var(--pos) scale(1.2, 0.82); }
      75% { transform: var(--pos) scale(0.92, 1.08); }
      100% { transform: var(--pos) scale(1, 1); }
    }
    @keyframes bubble-squish-y {
      0% { transform: var(--pos) scale(1, 1); }
      25% { transform: var(--pos) scale(1.28, 0.72); }
      50% { transform: var(--pos) scale(0.82, 1.20); }
      75% { transform: var(--pos) scale(1.08, 0.92); }
      100% { transform: var(--pos) scale(1, 1); }
    }
    .bubble.squish-x {
      animation: bubble-squish-x 0.42s var(--ease-spring) forwards;
    }
    .bubble.squish-y {
      animation: bubble-squish-y 0.42s var(--ease-spring) forwards;
    }

    /* Pop particles */
    .pop-particle {
      position: absolute; width: 10px; height: 10px;
      border-radius: 50%; pointer-events: none; z-index: 13;
      box-shadow: inset 2px 2px 4px rgba(255,255,255,0.4);
      animation: particle-fly 0.5s var(--ease-out-expo) forwards;
    }
    @keyframes particle-fly {
      0% { transform: translate(0, 0) scale(1); opacity: 1; }
      100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
    }

    /* Praise Text Popups */
    .praise-text {
      position: absolute;
      transform: translate(-50%, -50%) rotate(var(--rot)) scale(0);
      font-family: var(--font-display); font-size: 2.1rem; font-weight: 800;
      color: var(--accent-yellow);
      text-shadow: 
        -2.5px -2.5px 0 #072233,  
         2.5px -2.5px 0 #072233,
        -2.5px  2.5px 0 #072233,
         2.5px  2.5px 0 #072233,
         0 6px 0 #072233,
         0 8px 16px rgba(0,0,0,0.35);
      z-index: 15; pointer-events: none;
      animation: praise-float 0.95s var(--ease-spring) forwards;
    }
    @keyframes praise-float {
      0% { transform: translate(-50%, -50%) rotate(var(--rot)) scale(0.4); opacity: 0; }
      20% { transform: translate(-50%, -50%) rotate(var(--rot)) scale(1.25); opacity: 1; }
      80% { opacity: 1; }
      100% { transform: translate(-50%, -80px) rotate(var(--rot)) scale(0.95); opacity: 0; }
    }

    /* Screen shake */
    .shake { animation: shake 0.35s var(--ease-out-expo); }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-3px); }
      80% { transform: translateX(3px); }
    }

    /* Correct flash overlay */
    .flash-overlay {
      position: absolute; inset: 0; z-index: 14;
      pointer-events: none; opacity: 0;
      transition: opacity 0.15s;
    }
    .flash-overlay.correct { background: rgba(29, 209, 161, 0.12); opacity: 1; }
    .flash-overlay.wrong   { background: rgba(255, 107, 107, 0.15); opacity: 1; }

    /* ═══════════════════════════════════════════════════════════
       GAME OVER SCREEN
       ═══════════════════════════════════════════════════════════ */
    #screen-gameover {
      padding: 24px; justify-content: center; gap: 4px;
    }

    .go-label {
      font-family: var(--font-display);
      font-size: 0.85rem; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 3px; margin-bottom: 4px;
    }
    .go-score {
      font-family: var(--font-display); font-weight: 800;
      font-size: clamp(4.5rem, 20vw, 8rem); line-height: 1;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-teal));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; margin-bottom: 10px;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.15));
    }
    .go-detail {
      font-size: 1rem; color: var(--text-secondary); margin-bottom: 4px;
      font-weight: 600;
    }
    .go-detail span { color: var(--accent-yellow); font-weight: 700; }
    .go-new-best {
      font-size: 1rem; color: var(--accent-orange); font-weight: 800;
      margin-top: 8px; margin-bottom: 24px;
      opacity: 0; transform: translateY(6px);
      transition: opacity 0.4s, transform 0.4s var(--ease-spring);
    }
    .go-new-best.show { opacity: 1; transform: translateY(0); }

    .btn-retry {
      width: min(280px, 80vw); height: 58px; border: none;
      border-radius: var(--radius-full);
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-teal));
      color: var(--bg-deep); font-family: var(--font-display);
      font-size: 1.15rem; font-weight: 800; letter-spacing: 0.5px;
      cursor: pointer; overflow: hidden; position: relative;
      box-shadow: 0 4px 20px var(--accent-cyan-glow);
      transition: transform 0.15s var(--ease-spring);
      animation: pulse-glow-cyan 2.5s ease-in-out infinite;
    }
    .btn-retry:active { transform: scale(0.95); }
    .btn-retry::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.22), transparent);
      border-radius: inherit;
    }

    .btn-settings {
      margin-top: 12px; width: min(280px, 80vw); height: 44px;
      border: 2px solid rgba(255,255,255,0.08); border-radius: var(--radius-full);
      background: var(--bg-card); color: var(--text-secondary);
      font-family: var(--font-body); font-size: 0.95rem; font-weight: 700;
      cursor: pointer; box-shadow: inset 0 -2px 3px rgba(0,0,0,0.1);
      transition: transform 0.15s var(--ease-spring);
    }
    .btn-settings:hover { background: var(--bg-card-hover); }
    .btn-settings:active { transform: scale(0.95); }

    .btn-share {
      margin-top: 8px; width: min(280px, 80vw); height: 44px;
      border: 2px solid rgba(255,255,255,0.08); border-radius: var(--radius-full);
      background: var(--bg-card); color: var(--text-secondary);
      font-family: var(--font-body); font-size: 0.95rem; font-weight: 700;
      cursor: pointer; box-shadow: inset 0 -2px 3px rgba(0,0,0,0.1);
      transition: transform 0.15s var(--ease-spring);
    }
    .btn-share:hover { background: var(--bg-card-hover); }
    .btn-share:active { transform: scale(0.95); }

    /* ═══════════════════════════════════════════════════════════
       RESPONSIVE
       ═══════════════════════════════════════════════════════════ */
    @media (max-height: 640px) {
      .sel-title { margin-top: 4px; font-size: 2.1rem; }
      .sel-subtitle { margin-bottom: 12px; }
      .op-card { padding: 10px 4px; min-height: 68px; }
      .sel-stats { margin-top: 12px; }
      .question-bar { padding: 8px 16px; }
      .mascot-container { width: 50px; height: 50px; }
      .octopus-head { width: 38px; height: 34px; left: 6px; }
      .octopus-eyes { gap: 6px; margin-top: 8px; }
      .octopus-eye { width: 9px; height: 9px; }
      .octopus-pupil { width: 4px; height: 4px; }
      .octopus-mouth { width: 6px; height: 4px; }
      .octopus-tentacles { bottom: 6px; left: 8px; }
      .tentacle { width: 5px; height: 11px; }
      .question-board { padding: 4px 12px; }
      .question-text { font-size: 1.6rem; }
    }
  </style>
</head>
<body>
  <!-- Ambient Ocean Background -->
  <div class="bg-waves"></div>
  <div class="bg-seaweed bg-seaweed--1"></div>
  <div class="bg-seaweed bg-seaweed--2"></div>
  <div class="bg-bubbles" id="bg-bubbles-container"></div>

  <!-- ════════════════════════════════════════════════════════ -->
  <!-- SELECTION SCREEN                                        -->
  <!-- ════════════════════════════════════════════════════════ -->
  <div id="screen-select" class="screen active">
    <h1 class="sel-title">Bubble Math</h1>
    <p class="sel-subtitle">Pop the bubble with the <span>right answer</span></p>

    <div class="section-label">Operations</div>
    <div class="op-grid" id="op-grid">
      <div class="op-card" data-op="add"><div class="op-symbol">+</div><div class="op-name">Add</div></div>
      <div class="op-card" data-op="sub"><div class="op-symbol">−</div><div class="op-name">Subtract</div></div>
      <div class="op-card" data-op="mul"><div class="op-symbol">×</div><div class="op-name">Multiply</div></div>
      <div class="op-card" data-op="div"><div class="op-symbol">÷</div><div class="op-name">Divide</div></div>
      <div class="op-card" data-op="mix"><div class="op-symbol">⚡</div><div class="op-name">Mixed</div></div>
    </div>

    <div class="tables-section" id="tables-section">
      <div class="section-label">Practice Tables</div>
      <div class="table-chips" id="table-chips"></div>
    </div>

    <div class="section-label">Mode</div>
    <div class="mode-row">
      <button class="mode-btn selected" data-mode="survival" id="mode-survival">💀 Survival</button>
      <button class="mode-btn" data-mode="practice" id="mode-practice">📚 Practice</button>
    </div>

    <button id="btn-start" class="btn-start" disabled>SELECT TO START</button>

    <div class="sel-stats">
      <div class="mini-stat">
        <div class="mini-stat__label">Best</div>
        <div id="sel-best" class="mini-stat__value">0</div>
      </div>
      <div class="mini-stat">
        <div class="mini-stat__label">Streak</div>
        <div id="sel-streak" class="mini-stat__value">0</div>
      </div>
    </div>
  </div>

  <!-- ════════════════════════════════════════════════════════ -->
  <!-- GAME SCREEN                                             -->
  <!-- ════════════════════════════════════════════════════════ -->
  <div id="screen-game" class="screen">
    <div class="game-hud">
      <div class="hud-item">Score <span id="hud-score">0</span></div>
      <div class="hud-lives" id="hud-lives"></div>
      <div class="hud-item">Lvl <span id="hud-level">1</span></div>
    </div>
    <div class="question-bar">
      <div class="mascot-container">
        <div class="mascot" id="mascot-octopus">
          <div class="octopus-head">
            <div class="octopus-eyes">
              <div class="octopus-eye left"><div class="octopus-pupil"></div></div>
              <div class="octopus-eye right"><div class="octopus-pupil"></div></div>
            </div>
            <div class="octopus-mouth"></div>
          </div>
          <div class="octopus-tentacles">
            <div class="tentacle t1"></div>
            <div class="tentacle t2"></div>
            <div class="tentacle t3"></div>
            <div class="tentacle t4"></div>
          </div>
        </div>
      </div>
      <div class="question-board">
        <div id="question-text" class="question-text">—</div>
      </div>
    </div>
    <div class="play-area" id="play-area">
      <div class="flash-overlay" id="flash-overlay"></div>
    </div>
  </div>

  <!-- ════════════════════════════════════════════════════════ -->
  <!-- GAME OVER SCREEN                                        -->
  <!-- ════════════════════════════════════════════════════════ -->
  <div id="screen-gameover" class="screen">
    <div class="go-label">Score</div>
    <div id="go-score" class="go-score">0</div>
    <div class="go-detail">Answered <span id="go-rounds">0</span> questions</div>
    <div class="go-detail">Best streak: <span id="go-streak">0</span></div>
    <div class="go-detail">Level reached: <span id="go-lvl">1</span></div>
    <div id="go-new-best" class="go-new-best">🎉 NEW HIGH SCORE!</div>
    <button id="btn-retry" class="btn-retry">TAP TO RETRY</button>
    <button id="btn-back" class="btn-settings">⚙️ Change Settings</button>
    <button id="btn-go-share" class="btn-share">📤 Share Score</button>
  </div>

  <script>
  /* ═══════════════════════════════════════════════════════════
     AUDIO (Web Audio API — zero latency)
     ═══════════════════════════════════════════════════════════ */
  const SFX = (() => {
    let ctx = null;
    function c() {
      if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
      if (ctx.state === 'suspended') ctx.resume();
      return ctx;
    }
    function tone(freq, dur, type = 'sine', vol = 0.12) {
      const ac = c(), osc = ac.createOscillator(), g = ac.createGain();
      osc.type = type; osc.frequency.setValueAtTime(freq, ac.currentTime);
      g.gain.setValueAtTime(vol, ac.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
      osc.connect(g); g.connect(ac.destination);
      osc.start(ac.currentTime); osc.stop(ac.currentTime + dur);
    }
    return {
      pop() {
        const ac = c(), osc = ac.createOscillator(), g = ac.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(450, ac.currentTime);
        osc.frequency.exponentialRampToValueAtTime(1300, ac.currentTime + 0.08);
        g.gain.setValueAtTime(0.14, ac.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.08);
        osc.connect(g); g.connect(ac.destination);
        osc.start(); osc.stop(ac.currentTime + 0.08);
      },
      correct() {
        const ac = c();
        const playChime = (freq, delay) => {
          setTimeout(() => {
            const osc = ac.createOscillator(), g = ac.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, ac.currentTime);
            g.gain.setValueAtTime(0.07, ac.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.25);
            osc.connect(g); g.connect(ac.destination);
            osc.start(); osc.stop(ac.currentTime + 0.25);
          }, delay);
        };
        playChime(523.25, 0);   // C5
        playChime(659.25, 50);  // E5
        playChime(784.00, 100); // G5
        playChime(1046.50, 150); // C6
      },
      wrong() {
        const ac = c(), osc = ac.createOscillator(), g = ac.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(260, ac.currentTime);
        osc.frequency.linearRampToValueAtTime(90, ac.currentTime + 0.25);
        g.gain.setValueAtTime(0.16, ac.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.25);
        osc.connect(g); g.connect(ac.destination);
        osc.start(); osc.stop(ac.currentTime + 0.25);
      },
      spawn() {
        const ac = c();
        for (let i = 0; i < 3; i++) {
          setTimeout(() => {
            const osc = ac.createOscillator(), g = ac.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(550 + i * 150, ac.currentTime);
            g.gain.setValueAtTime(0.03, ac.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.04);
            osc.connect(g); g.connect(ac.destination);
            osc.start(); osc.stop(ac.currentTime + 0.04);
          }, i * 35);
        }
      },
      tap() { tone(550, 0.04, 'triangle', 0.08); },
    };
  })();

  /* ═══════════════════════════════════════════════════════════
     STORE (localStorage — never leaves device)
     ═══════════════════════════════════════════════════════════ */
  const Store = {
    get(k, fb = 0) { try { return JSON.parse(localStorage.getItem('bm_' + k)) ?? fb; } catch { return fb; } },
    set(k, v)      { try { localStorage.setItem('bm_' + k, JSON.stringify(v)); } catch {} },
  };

  /* ═══════════════════════════════════════════════════════════
     QUESTION GENERATOR
     ═══════════════════════════════════════════════════════════ */
  const Questions = {
    generate(types, tables, difficulty) {
      const type = types[Math.floor(Math.random() * types.length)];
      const maxNum = difficulty.maxNum;
      let a, b, answer, text;

      switch (type) {
        case 'add':
          a = randInt(1, maxNum); b = randInt(1, maxNum);
          answer = a + b; text = `${a} + ${b} = ?`;
          break;
        case 'sub':
          a = randInt(2, maxNum); b = randInt(1, a);
          answer = a - b; text = `${a} − ${b} = ?`;
          break;
        case 'mul': {
          const t = tables.length ? tables[randInt(0, tables.length - 1)] : randInt(2, 12);
          b = t; a = randInt(1, Math.min(12, maxNum));
          answer = a * b; text = `${a} × ${b} = ?`;
          break;
        }
        case 'div': {
          const t = tables.length ? tables[randInt(0, tables.length - 1)] : randInt(2, 12);
          b = t; a = randInt(1, Math.min(12, maxNum));
          answer = a; // a is the quotient
          text = `${a * b} ÷ ${b} = ?`;
          break;
        }
      }

      return { text, answer, type, operands: [a, b] };
    }
  };

  /* ═══════════════════════════════════════════════════════════
     DECOY GENERATOR & DIFFICULTY SYSTEMS
     ═══════════════════════════════════════════════════════════ */
  const Decoys = {
    generate(answer, type, operands, difficulty, count) {
      const pool = new Set();
      const [a, b] = operands;
      const nearMiss = difficulty.level >= 3;

      // Always add near-misses for challenge
      pool.add(answer + 1); pool.add(answer - 1);
      pool.add(answer + 2); pool.add(answer - 2);

      if (nearMiss) {
        pool.add(answer + 10); pool.add(answer - 10);
        // Digit swap for 2-digit answers
        if (answer >= 10 && answer < 100) {
          const swapped = parseInt(String(answer).split('').reverse().join(''));
          if (swapped !== answer) pool.add(swapped);
        }
      }

      // Add operation specific smart decoys
      if (type === 'add' || type === 'sub') {
        pool.add(answer + 5); pool.add(answer - 5);
      } else if (type === 'mul' || type === 'div') {
        pool.add(answer + a); pool.add(answer - a);
        pool.add(answer + b); pool.add(answer - b);
      }

      // Filter out negative numbers and the answer itself
      const validDecoys = Array.from(pool).filter(x => x >= 0 && x !== answer);

      // Shuffle and pick
      shuffle(validDecoys);

      const result = [];
      for (let i = 0; i < count; i++) {
        if (i < validDecoys.length) {
          result.push(validDecoys[i]);
        } else {
          let val = answer;
          while (val === answer || result.includes(val) || val < 0) {
            val = answer + randInt(-12, 12);
          }
          result.push(val);
        }
      }
      return result;
    }
  };

  const Difficulty = {
    forScore(score) {
      if (score < 4)  return { bubbleCount: 4, speed: 25,  maxNum: 10, level: 1 };
      if (score < 8)  return { bubbleCount: 4, speed: 35,  maxNum: 12, level: 2 };
      if (score < 13) return { bubbleCount: 5, speed: 42,  maxNum: 15, level: 3 };
      if (score < 18) return { bubbleCount: 5, speed: 50,  maxNum: 18, level: 4 };
      if (score < 25) return { bubbleCount: 6, speed: 58,  maxNum: 20, level: 5 };
      if (score < 35) return { bubbleCount: 6, speed: 65,  maxNum: 25, level: 6 };
      return              { bubbleCount: 7, speed: 72,  maxNum: 30, level: 7 };
    }
  };

  const BUBBLE_COLORS = [
    'rgba(108, 92, 231, 0.55)',  // purple
    'rgba(0, 184, 148, 0.55)',   // teal
    'rgba(225, 112, 85, 0.55)',  // coral
    'rgba(9, 132, 227, 0.55)',   // blue
    'rgba(253, 203, 110, 0.55)', // gold
    'rgba(236, 72, 153, 0.55)',  // pink
    'rgba(0, 206, 201, 0.55)',   // cyan
    'rgba(162, 155, 254, 0.55)', // lavender
  ];

  /* ═══════════════════════════════════════════════════════════
     BUBBLE MANAGER
     DOM-based bubbles with rAF movement and bubble-to-bubble collision physics.
     ═══════════════════════════════════════════════════════════ */
  const BubbleMgr = {
    bubbles: [],
    area: null,
    animFrame: null,
    lastTime: 0,

    getArea() {
      const el = document.getElementById('play-area');
      const rect = el.getBoundingClientRect();
      return { el, w: rect.width, h: rect.height };
    },

    spawn(values, correctAnswer, speed) {
      this.clearAll();
      this.area = this.getArea();
      this.baseSpeed = speed;
      const size = Math.min(85, Math.max(65, this.area.w / (values.length + 1)));
      const positions = this._placeBubbles(values.length, size);

      // Play bubble spawning SFX cascade
      SFX.spawn();

      values.forEach((val, i) => {
        const color = BUBBLE_COLORS[i % BUBBLE_COLORS.length];
        const el = document.createElement('div');
        
        // Mark worry face if decoy is a near-miss
        const isNearMiss = Math.abs(val - correctAnswer) <= 2 && val !== correctAnswer;
        el.className = 'bubble spawning' + (isNearMiss ? ' worry' : '');
        
        el.style.width = el.style.height = size + 'px';
        el.style.fontSize = (size * 0.30) + 'px';
        el.style.background = `radial-gradient(circle at 35% 30%, ${color.replace('0.55', '0.75')}, ${color})`;
        el.style.border = `2.5px solid ${color.replace('0.55', '0.35')}`;
        el.style.boxShadow = `0 4px 15px ${color.replace('0.55', '0.18')}, inset 0 -4px 10px rgba(0,0,0,0.15)`;
        el.style.animationDelay = (i * 0.05) + 's';
        el.dataset.value = val;

        // Bubbly character face + number markup
        el.innerHTML = `
          <div class="bubble-eyes">
            <div class="bubble-eye left"><div class="bubble-pupil"></div></div>
            <div class="bubble-eye right"><div class="bubble-pupil"></div></div>
          </div>
          <div class="bubble-mouth"></div>
          <div class="bubble-val">${val}</div>
        `;

        const b = {
          el, x: positions[i].x, y: positions[i].y,
          vx: (Math.random() - 0.5) * speed * 1.25,
          vy: (Math.random() - 0.5) * speed,
          size, value: val, isCorrect: val === correctAnswer,
          wobblePhase: Math.random() * Math.PI * 2,
          wobbleSpeed: 1.2 + Math.random() * 1.5,
          wobbleAmp: 6 + Math.random() * 8,
          popped: false
        };

        el.style.setProperty('--pos', `translate(${b.x}px, ${b.y}px)`);
        el.style.transform = `translate(${b.x}px, ${b.y}px) scale(0)`;

        el.addEventListener('pointerdown', (e) => {
          e.preventDefault(); e.stopPropagation();
          Game.handleBubbleTap(b);
        });

        this.area.el.appendChild(el);
        this.bubbles.push(b);

        // Remove spawn class after animation
        setTimeout(() => el.classList.remove('spawning'), 450);
      });

      this.lastTime = performance.now();
      this._startLoop();
    },

    _placeBubbles(count, size) {
      const a = this.area;
      const pad = size / 2 + 10;
      const positions = [];
      const minDist = size + 12;

      for (let i = 0; i < count; i++) {
        let placed = false;
        for (let attempt = 0; attempt < 80; attempt++) {
          const x = pad + Math.random() * (a.w - size - pad * 2);
          const y = pad + Math.random() * (a.h - size - pad * 2);
          const ok = positions.every(p =>
            Math.hypot(p.x - x, p.y - y) >= minDist
          );
          if (ok) { positions.push({ x, y }); placed = true; break; }
        }
        if (!placed) positions.push({
          x: pad + Math.random() * (a.w - size - pad * 2),
          y: pad + Math.random() * (a.h - size - pad * 2),
        });
      }
      return positions;
    },

    triggerSquish(b, dir = 'x') {
      const className = dir === 'x' ? 'squish-x' : 'squish-y';
      if (b.el.classList.contains('squish-x') || b.el.classList.contains('squish-y') || b.el.classList.contains('spawning')) return;
      b.el.classList.add(className);
      setTimeout(() => b.el.classList.remove(className), 420);
    },

    _startLoop() {
      const loop = (now) => {
        const dt = Math.min((now - this.lastTime) / 1000, 0.05);
        this.lastTime = now;

        const len = this.bubbles.length;

        // 1. Update Positions & Regulate Speeds
        for (const b of this.bubbles) {
          if (b.popped) continue;

          b.x += b.vx * dt;
          b.y += b.vy * dt;

          // Wobble
          b.wobblePhase += b.wobbleSpeed * dt;
          const wobbleX = Math.sin(b.wobblePhase) * b.wobbleAmp * dt;
          b.x += wobbleX;

          // Enforce active, bouncy velocities
          let speedVal = Math.hypot(b.vx, b.vy);
          const minSpeed = this.baseSpeed * 0.75;
          const maxSpeed = this.baseSpeed * 1.35;
          if (speedVal < minSpeed) {
            if (speedVal === 0) {
              b.vx = (Math.random() - 0.5);
              b.vy = (Math.random() - 0.5);
              speedVal = Math.hypot(b.vx, b.vy);
            }
            b.vx = (b.vx / speedVal) * minSpeed;
            b.vy = (b.vy / speedVal) * minSpeed;
          } else if (speedVal > maxSpeed) {
            b.vx = (b.vx / speedVal) * maxSpeed;
            b.vy = (b.vy / speedVal) * maxSpeed;
          }

          // Boundary collisions
          const a = this.area;
          const pad = 4;
          let hitWallX = false;
          let hitWallY = false;
          if (b.x < pad) { b.x = pad; b.vx = Math.abs(b.vx); hitWallX = true; }
          else if (b.x > a.w - b.size - pad) { b.x = a.w - b.size - pad; b.vx = -Math.abs(b.vx); hitWallX = true; }
          if (b.y < pad) { b.y = pad; b.vy = Math.abs(b.vy); hitWallY = true; }
          else if (b.y > a.h - b.size - pad) { b.y = a.h - b.size - pad; b.vy = -Math.abs(b.vy); hitWallY = true; }

          if (hitWallX) this.triggerSquish(b, 'x');
          if (hitWallY) this.triggerSquish(b, 'y');
        }

        // 2. Resolve elastic bubble-to-bubble collisions
        for (let i = 0; i < len; i++) {
          const b1 = this.bubbles[i];
          if (b1.popped) continue;

          for (let j = i + 1; j < len; j++) {
            const b2 = this.bubbles[j];
            if (b2.popped) continue;

            const c1x = b1.x + b1.size / 2;
            const c1y = b1.y + b1.size / 2;
            const c2x = b2.x + b2.size / 2;
            const c2y = b2.y + b2.size / 2;

            const dx = c2x - c1x;
            const dy = c2y - c1y;
            const dist = Math.hypot(dx, dy);
            const minDist = b1.size / 2 + b2.size / 2;

            if (dist < minDist && dist > 0) {
              const overlap = minDist - dist;
              const nx = dx / dist;
              const ny = dy / dist;

              // Separate bubbles slightly
              b1.x -= nx * overlap * 0.5;
              b1.y -= ny * overlap * 0.5;
              b2.x += nx * overlap * 0.5;
              b2.y += ny * overlap * 0.5;

              // Compute relative velocity
              const kx = b2.vx - b1.vx;
              const ky = b2.vy - b1.vy;
              const vn = kx * nx + ky * ny;

              // If moving towards each other, swap velocities along normal with snappy rebound
              if (vn < 0) {
                const impulse = -vn * 1.15;
                b1.vx -= nx * impulse;
                b1.vy -= ny * impulse;
                b2.vx += nx * impulse;
                b2.vy += ny * impulse;

                // Trigger squash & stretch bounce effect based on impact normal
                const dir = Math.abs(nx) > Math.abs(ny) ? 'x' : 'y';
                this.triggerSquish(b1, dir);
                this.triggerSquish(b2, dir);
              }
            }
          }
        }

        // 3. Render Transform
        for (const b of this.bubbles) {
          if (b.popped) continue;
          b.el.style.transform = `translate(${b.x}px, ${b.y}px) scale(1)`;
          b.el.style.setProperty('--pos', `translate(${b.x}px, ${b.y}px)`);
        }

        this.animFrame = requestAnimationFrame(loop);
      };
      this.animFrame = requestAnimationFrame(loop);
    },

    popBubble(bubble, isCorrect) {
      bubble.popped = true;
      if (isCorrect) {
        bubble.el.classList.add('popping');
        this._spawnParticles(bubble);
        this.showPraiseText(bubble);
      } else {
        bubble.el.classList.add('wrong');
      }
    },

    showPraiseText(bubble) {
      const praises = ["Super!", "Yay!", "Awesome!", "Wow!", "Perfect!", "Great Job!", "Splendid!", "Bingo!", "Hooray!"];
      const text = praises[Math.floor(Math.random() * praises.length)];

      const cx = bubble.x + bubble.size / 2;
      const cy = bubble.y + bubble.size / 2;

      const el = document.createElement('div');
      el.className = 'praise-text';
      el.textContent = text;
      el.style.left = cx + 'px';
      el.style.top = cy + 'px';
      el.style.setProperty('--rot', (Math.random() * 20 - 10) + 'deg');

      this.area.el.appendChild(el);
      setTimeout(() => el.remove(), 1000);
    },

    _spawnParticles(bubble) {
      const cx = bubble.x + bubble.size / 2;
      const cy = bubble.y + bubble.size / 2;

      for (let i = 0; i < 8; i++) {
        const p = document.createElement('div');
        p.className = 'pop-particle';
        const angle = (Math.PI * 2 / 8) * i + Math.random() * 0.5;
        const dist = 30 + Math.random() * 40;
        p.style.left = cx + 'px';
        p.style.top = cy + 'px';
        p.style.background = BUBBLE_COLORS[Math.floor(Math.random() * BUBBLE_COLORS.length)].replace('0.55', '0.85');
        p.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
        p.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
        this.area.el.appendChild(p);
        setTimeout(() => p.remove(), 500);
      }
    },

    fadeOutAll() {
      for (const b of this.bubbles) {
        if (!b.popped) {
          b.el.style.transition = 'opacity 0.2s, transform 0.2s';
          b.el.style.opacity = '0';
          b.el.style.transform += ' scale(0.7)';
        }
      }
    },

    clearAll() {
      cancelAnimationFrame(this.animFrame);
      for (const b of this.bubbles) b.el.remove();
      this.bubbles = [];
      if (this.area?.el) {
        this.area.el.querySelectorAll('.pop-particle').forEach(p => p.remove());
        this.area.el.querySelectorAll('.praise-text').forEach(p => p.remove());
      }
    },
  };

  /* ═══════════════════════════════════════════════════════════
     GAME STATE MACHINE
     ═══════════════════════════════════════════════════════════ */
  const $ = id => document.getElementById(id);
  const screens = {
    select:   $('screen-select'),
    game:     $('screen-game'),
    gameover: $('screen-gameover'),
  };
  function showScreen(name) {
    Object.values(screens).forEach(s => s.classList.remove('active'));
    screens[name].classList.add('active');
  }

  const Game = {
    score: 0,
    streak: 0,
    bestStreak: 0,
    lives: 3,
    mode: 'survival',
    types: [],
    tables: [],
    currentQuestion: null,
    isActive: false,

    start(config) {
      this.types = config.types;
      this.tables = config.tables;
      this.mode = config.mode;
      this.score = 0;
      this.streak = 0;
      this.bestStreak = 0;
      this.lives = 3;
      this.isActive = true;

      this._updateHUD();
      showScreen('game');

      // Small delay for screen transition
      setTimeout(() => this.nextQuestion(), 300);
    },

    nextQuestion() {
      if (!this.isActive) return;

      // Reset mascot state
      const mascot = $('mascot-octopus');
      if (mascot) {
        mascot.className = 'mascot';
      }

      const diff = Difficulty.forScore(this.score);
      const q = Questions.generate(this.types, this.tables, diff);
      this.currentQuestion = q;

      // Display question
      const qEl = $('question-text');
      qEl.textContent = q.text;
      qEl.classList.remove('pop-in');
      void qEl.offsetWidth;
      qEl.classList.add('pop-in');

      // Generate decoys
      const decoyCount = diff.bubbleCount - 1;
      const decoys = Decoys.generate(q.answer, q.type, q.operands, diff, decoyCount);
      const values = [q.answer, ...decoys.slice(0, decoyCount)];
      shuffle(values);

      // Spawn bubbles
      BubbleMgr.spawn(values, q.answer, diff.speed);

      this._updateHUD();
    },

    handleBubbleTap(bubble) {
      if (!this.isActive || bubble.popped) return;

      if (bubble.isCorrect) {
        // CORRECT
        SFX.pop();
        SFX.correct();
        BubbleMgr.popBubble(bubble, true);
        BubbleMgr.fadeOutAll();

        // Animate mascot success reaction
        const mascot = $('mascot-octopus');
        if (mascot) {
          mascot.className = 'mascot celebrate';
        }

        this.score++;
        this.streak++;
        if (this.streak > this.bestStreak) this.bestStreak = this.streak;

        // Flash
        const fl = $('flash-overlay');
        fl.className = 'flash-overlay correct';
        setTimeout(() => fl.className = 'flash-overlay', 200);

        this._updateHUD();

        // Next question after brief pop celebration
        setTimeout(() => {
          if (this.isActive) this.nextQuestion();
        }, 450);

      } else {
        // WRONG
        SFX.wrong();
        BubbleMgr.popBubble(bubble, false);
        if (navigator.vibrate) navigator.vibrate(60);
        this.streak = 0;

        // Animate mascot oops reaction
        const mascot = $('mascot-octopus');
        if (mascot) {
          mascot.className = 'mascot sad';
        }

        // Flash + shake
        const fl = $('flash-overlay');
        fl.className = 'flash-overlay wrong';
        $('screen-game').classList.add('shake');
        setTimeout(() => {
          fl.className = 'flash-overlay';
          $('screen-game').classList.remove('shake');
        }, 350);

        if (this.mode === 'survival') {
          this.isActive = false;
          setTimeout(() => this._gameOver(), 500);
        } else {
          // Practice mode — lose a life
          this.lives--;
          this._updateHUD();
          if (this.lives <= 0) {
            this.isActive = false;
            setTimeout(() => this._gameOver(), 500);
          }
          // Otherwise, keep playing — wrong bubble disappears, rest stay
        }
      }
    },

    _gameOver() {
      BubbleMgr.clearAll();
      const isNewBest = this.score > Store.get('best', 0);
      if (isNewBest) Store.set('best', this.score);
      if (this.bestStreak > Store.get('bestStreak', 0)) Store.set('bestStreak', this.bestStreak);

      $('go-score').textContent = this.score;
      $('go-rounds').textContent = this.score;
      $('go-streak').textContent = this.bestStreak;
      $('go-lvl').textContent = Difficulty.forScore(this.score).level;
      $('go-new-best').classList.toggle('show', isNewBest);

      showScreen('gameover');
      updateSelStats();
    },

    _updateHUD() {
      $('hud-score').textContent = this.score;
      $('hud-level').textContent = Difficulty.forScore(this.score).level;

      // Lives (practice mode)
      const livesEl = $('hud-lives');
      if (this.mode === 'practice') {
        livesEl.innerHTML = '';
        for (let i = 0; i < 3; i++) {
          const h = document.createElement('span');
          h.className = 'heart' + (i >= this.lives ? ' lost' : '');
          h.textContent = '❤️';
          livesEl.appendChild(h);
        }
      } else {
        livesEl.innerHTML = '';
      }
    }
  };

  /* ═══════════════════════════════════════════════════════════
     SELECTION SCREEN LOGIC
     ═══════════════════════════════════════════════════════════ */
  let selectedOps = new Set();
  let selectedTables = new Set();
  let selectedMode = 'survival';

  // Build table chips
  const tableChipsEl = $('table-chips');
  for (let t = 2; t <= 12; t++) {
    const chip = document.createElement('div');
    chip.className = 'table-chip';
    chip.textContent = '×' + t;
    chip.dataset.table = t;
    chip.addEventListener('click', () => {
      SFX.tap();
      if (selectedTables.has(t)) { selectedTables.delete(t); chip.classList.remove('selected'); }
      else { selectedTables.add(t); chip.classList.add('selected'); }
    });
    tableChipsEl.appendChild(chip);
  }

  // Operation card clicks
  document.querySelectorAll('.op-card').forEach(card => {
    card.addEventListener('click', () => {
      SFX.tap();
      const op = card.dataset.op;

      if (op === 'mix') {
        // Mix: select all, deselect individual
        if (selectedOps.has('mix')) {
          selectedOps.clear();
        } else {
          selectedOps.clear();
          selectedOps.add('mix');
        }
      } else {
        selectedOps.delete('mix');
        if (selectedOps.has(op)) selectedOps.delete(op);
        else selectedOps.add(op);
      }

      // Update card visuals
      document.querySelectorAll('.op-card').forEach(c =>
        c.classList.toggle('selected', selectedOps.has(c.dataset.op))
      );

      // Show/hide table sub-selection
      const needTables = selectedOps.has('mul') || selectedOps.has('div') || selectedOps.has('mix');
      $('tables-section').classList.toggle('visible', needTables);

      // Enable/disable start
      $('btn-start').disabled = selectedOps.size === 0;
      $('btn-start').textContent = selectedOps.size > 0 ? '▶  START' : 'SELECT TO START';
    });
  });

  // Mode buttons
  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      SFX.tap();
      selectedMode = btn.dataset.mode;
      document.querySelectorAll('.mode-btn').forEach(b =>
        b.classList.toggle('selected', b.dataset.mode === selectedMode)
      );
    });
  });

  // Start button
  $('btn-start').addEventListener('click', () => {
    if (selectedOps.size === 0) return;
    SFX.tap();

    let types;
    if (selectedOps.has('mix')) {
      types = ['add', 'sub', 'mul', 'div'];
    } else {
      types = [...selectedOps];
    }

    // Save last selection
    Store.set('lastOps', types);
    Store.set('lastTables', [...selectedTables]);
    Store.set('lastMode', selectedMode);

    Game.start({
      types,
      tables: [...selectedTables],
      mode: selectedMode,
    });
  });

  // Retry — same settings, instant
  $('btn-retry').addEventListener('click', () => {
    SFX.tap();
    Game.start({
      types: Store.get('lastOps', ['add']),
      tables: Store.get('lastTables', []),
      mode: Store.get('lastMode', 'survival'),
    });
  });

  // Back to settings
  $('btn-back').addEventListener('click', () => {
    SFX.tap();
    showScreen('select');
  });

  // Share
  $('btn-go-share').addEventListener('click', async () => {
    const text = `🫧 Bubble Math — Scored ${Game.score}!\nStreak: ${Game.bestStreak} | Level ${Difficulty.forScore(Game.score).level}\n\n#BubbleMath`;
    if (navigator.share) {
      try { await navigator.share({ title: 'Bubble Math', text }); } catch {}
    } else {
      try {
        await navigator.clipboard.writeText(text);
        $('btn-go-share').textContent = '✅ Copied!';
        setTimeout(() => $('btn-go-share').textContent = '📤 Share Score', 1500);
      } catch { prompt('Copy your score:', text); }
    }
  });

  /* ═══════════════════════════════════════════════════════════
     UTILS
     ═══════════════════════════════════════════════════════════ */
  function randInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function updateSelStats() {
    $('sel-best').textContent = Store.get('best', 0);
    $('sel-streak').textContent = Store.get('bestStreak', 0);
  }

  /* ═══════════════════════════════════════════════════════════
     INIT
     ═══════════════════════════════════════════════════════════ */
  updateSelStats();
  initBgBubbles();

  function initBgBubbles() {
    const container = $('bg-bubbles-container');
    if (!container) return;
    for (let i = 0; i < 15; i++) {
      const b = document.createElement('div');
      b.className = 'bg-bubble-particle';
      const size = randInt(10, 24);
      b.style.width = b.style.height = size + 'px';
      b.style.left = randInt(0, 100) + '%';
      b.style.animationDelay = (Math.random() * 10) + 's';
      b.style.animationDuration = (8 + Math.random() * 10) + 's';
      b.style.setProperty('--drift', (Math.random() * 50 - 25) + 'px');
      container.appendChild(b);
    }
  }

  // Restore last selection if available
  const lastOps = Store.get('lastOps', null);
  if (lastOps && Array.isArray(lastOps)) {
    lastOps.forEach(op => {
      selectedOps.add(op);
      const card = document.querySelector(`.op-card[data-op="${op}"]`);
      if (card) card.classList.add('selected');
    });
    $('btn-start').disabled = false;
    $('btn-start').textContent = '▶  START';
  }

  const lastTables = Store.get('lastTables', []);
  if (lastTables.length) {
    lastTables.forEach(t => {
      selectedTables.add(t);
      const chip = document.querySelector(`.table-chip[data-table="${t}"]`);
      if (chip) chip.classList.add('selected');
    });
    const needTables = selectedOps.has('mul') || selectedOps.has('div') || selectedOps.has('mix');
    $('tables-section').classList.toggle('visible', needTables);
  }

  const lastMode = Store.get('lastMode', 'survival');
  if (lastMode === 'practice') {
    selectedMode = 'practice';
    $('mode-survival').classList.remove('selected');
    $('mode-practice').classList.add('selected');
  }

  // Prevent double-tap zoom
  document.addEventListener('dblclick', e => e.preventDefault());

  // Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }
  </script>
</body>
